name: Executar tests Python

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del codi
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Instal·lar dependències
      run: |
        pip install pytest
        pip install pytest-mock

    - name: Executar tests
      run: |
        pytest -v
